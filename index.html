<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>

    <!-- Dark Mode Toggle -->
    <div class="toggle">🌙</div>

    <div class="app-wrapper">
        <div class="container">
            <h2>Currency Converter</h2>

        <form>
            <div class="amount">
                <div class="input-group">
                    <input type="number" id="amount" required>
                    <label for="amount">Enter Amount</label>
                </div>
            </div>

            <div class="dropdown">

                <div class="from">
                    <p>From</p>
                    <div class="select-container">
                        <img src="https://flagsapi.com/US/flat/64.png">
                        <select name="from"></select>
                    </div>
                </div>

                <i class="fa-solid fa-arrow-right-arrow-left"></i>

                <div class="to">
                    <p>To</p>
                    <div class="select-container">
                        <img src="https://flagsapi.com/IN/flat/64.png">
                        <select name="to"></select>
                    </div>
                </div>

            </div>

            <div class="msg"></div>

            <button>Get Exchange Rate</button>
        </form>
    </div>

    <!-- Quick Rates Section -->
    <div class="container rates-container">
        <h3>Live Exchange Rates (<span id="base-currency-label">USD</span>)</h3>
        
        <div class="rates-controls">
            <input type="text" id="search-rate" placeholder="Search currency...">
            
            <div class="control-group">
                <select id="sort-rate">
                    <option value="asc">Sort A - Z</option>
                    <option value="desc">Sort Z - A</option>
                    <option value="low">Rate: Low - High</option>
                    <option value="high">Rate: High - Low</option>
                </select>

                <select id="filter-rate">
                    <option value="all">Filter: All</option>
                    <option value="gt1">Rate > 1</option>
                    <option value="lt1">Rate < 1</option>
                    <option value="fav">Favorites</option>
                </select>
            </div>
        </div>

        <ul id="rates-list">
            <!-- Rates will be rendered here via JS -->
        </ul>
    </div>
    </div>

    <script src="codes.js"></script>
    <script src="app.js"></script>

</body>
</html>
